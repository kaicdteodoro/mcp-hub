services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3333}:3333"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3333}
      CLICKUP_API_KEY: ${CLICKUP_API_KEY:-}
      CLICKUP_TEAM_ID: ${CLICKUP_TEAM_ID:-}
      FIGMA_API_KEY: ${FIGMA_API_KEY}
      FIGMA_WRITE_BRIDGE_MODULE: ${FIGMA_WRITE_BRIDGE_MODULE:-}
      FIGMA_WRITE_BRIDGE_URL: ${FIGMA_WRITE_BRIDGE_URL:-}
      FIGMA_WRITE_BRIDGE_TOKEN: ${FIGMA_WRITE_BRIDGE_TOKEN:-}
      FIGMA_WRITE_BRIDGE_TIMEOUT_MS: ${FIGMA_WRITE_BRIDGE_TIMEOUT_MS:-10000}
      MCP_HUB_AUTH_TOKEN: ${MCP_HUB_AUTH_TOKEN:-}
    volumes:
      - ./mcp-hub.config.json:/app/mcp-hub.config.json:ro
      - /home/k41c/vault/kaic-brain:/vault:ro
      - ./credentials:/app/credentials:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
